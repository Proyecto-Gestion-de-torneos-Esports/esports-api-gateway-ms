
# api-gateway/application.yml
server:
  port: 8081

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: microservicio-autenticacion
          uri: lb://microservicio-autenticacion
          predicates:
            - Path=/api/auth/**

        - id: microservicio-auditoria
          uri: lb://microservicio-auditoria
          predicates:
            - Path=/api/auditoria/**

        - id: microservicio-notificaciones
          uri: lb://microservicio-notificaciones
          predicates:
              - Path=/api/notificacion/**, /api/estado/**

        - id: microservicio-ranking
          uri: lb://microservicio-ranking
          predicates:
            - Path=/api/ranking/**

        - id: microservicio-juego
          uri: lb://microservicio-juego
          predicates:
            - Path=/api/juego/**, /api/plataforma/**

        - id: microservicio-recompensas
          uri: lb://microservicio-recompensas
          predicates:
            - Path=/api/recompensa/**

        - id: reglas
          uri: lb://reglas
          predicates:
            - Path=/api/reglas/**

        - id: premios
          uri: lb://premios
          predicates:
            - Path=/api/premios/**

        - id: microservicio-estadistica
          uri: lb://microservicio-estadistica
          predicates:
            - Path=/api/estadisticas/**

        - id: torneos
          uri: lb://torneos
          predicates:
            - Path=/api/torneos/**

        - id: partidas
          uri: lb://partidas
          predicates:
            - Path=/api/partidas/**

        - id: equipos
          uri: lb://equipos
          predicates:
            - Path=/api/equipos/**

        - id: usuarios
          uri: lb://usuarios
          predicates:
            - Path=/api/usuarios/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true